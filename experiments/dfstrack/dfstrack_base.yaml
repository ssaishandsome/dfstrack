DATA:
  MAX_SAMPLE_INTERVAL: 400
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  SEARCH:
    CENTER_JITTER: 3.5
    FACTOR: 4.0
    SCALE_JITTER: 0.5
    SIZE: 256
    NUMBER: 1
  STD:
  - 0.229
  - 0.224
  - 0.225
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 128
    NUMBER: 1
  TRAIN:
    DATASETS_NAME:
    - LASOT
    - GOT10K_vottrain
    - TRACKINGNET
    - VastTrack
    - TNL2K_train
    # - RefCOCO14
    # - OTB99_train
    DATASETS_RATIO:
    - 6
    - 6
    - 6
    - 6
    - 6
    # - 6
    # - 1
    SAMPLE_PER_EPOCH: 25000
MODEL:
  PRETRAIN_FILE: "fast_itpn_base_clipl_e1600.pt"
  PRETRAINED_PATH: ""
  BACKBONE:
    TYPE: itpn_base
    STRIDE: 16
  DFS:
    ENABLED: true
    NUM_SLOTS: 4
    NUM_STABLE_SLOTS: 2
    SLOT_TEMPERATURE: 0.8
    NUM_HEADS: 8
    ATTN_DROPOUT: 0.0
    PROJ_DROPOUT: 0.0
    TARGET_RADIUS: 0
    CONTEXT_RADIUS: 1
    RELIABILITY_HIDDEN_DIM: 256
    FUSION_HIDDEN_DIM: 256
    STABLE_ALPHA: 0.8
    ADAPTIVE_ALPHA: 0.4
    USE_FIXED_ALPHA: true
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256
  HIDDEN_DIM: 512
TRAIN:
  BACKBONE_MULTIPLIER: 0.1
  DROP_PATH_RATE: 0.1
  BATCH_SIZE: 16
  EPOCH: 180
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  SLOT_DIV_WEIGHT: 0.1
  SLOT_ORTH_WEIGHT: 0.1
  SLOT_BAL_WEIGHT: 0.05
  GRAD_CLIP_NORM: 0.1
  LR: 0.0001
  LR_DROP_EPOCH: 144
  NUM_WORKER: 8
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  WEIGHT_DECAY: 0.0001
  AMP: False
  FIX_BN: true

TEST:
  EPOCH: 180
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 256
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 128
  WINDOW: true
  NUM_TEMPLATES: 1
